<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">SquadBrain systems map</title>
  <desc id="desc">A map from practice input to validation, ranking, and product feedback.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b1323"/><stop offset="1" stop-color="#17263f"/></linearGradient><linearGradient id="hot" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f0b33f"/><stop offset="1" stop-color="#ff8a3d"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity=".35"/></filter></defs>
  <rect width="1200" height="760" rx="42" fill="url(#bg)"/><g opacity=".11" stroke="#fff"><path d="M0 95H1200M0 190H1200M0 285H1200M0 380H1200M0 475H1200M0 570H1200M0 665H1200M120 0V760M240 0V760M360 0V760M480 0V760M600 0V760M720 0V760M840 0V760M960 0V760M1080 0V760"/></g>
  <g font-family="Inter, Arial" filter="url(#shadow)">
    <rect x="80" y="120" width="250" height="130" rx="28" fill="#111d32" stroke="rgba(255,255,255,.18)"/><text x="112" y="174" fill="#f0b33f" font-size="15" font-weight="900" letter-spacing="4">INPUT</text><text x="112" y="216" fill="#fff" font-size="30" font-weight="850">Roster card</text>
    <rect x="468" y="88" width="270" height="160" rx="30" fill="#111d32" stroke="rgba(255,255,255,.18)"/><text x="500" y="144" fill="#f0b33f" font-size="15" font-weight="900" letter-spacing="4">PRACTICE</text><text x="500" y="188" fill="#fff" font-size="30" font-weight="850">Priority score</text><text x="500" y="222" fill="#a8b4c7" font-size="20">due · miss · stability</text>
    <rect x="850" y="120" width="270" height="130" rx="28" fill="#111d32" stroke="rgba(255,255,255,.18)"/><text x="882" y="174" fill="#f0b33f" font-size="15" font-weight="900" letter-spacing="4">MATCH</text><text x="882" y="216" fill="#fff" font-size="30" font-weight="850">Same team</text>
    <rect x="160" y="480" width="286" height="150" rx="30" fill="#111d32" stroke="rgba(255,255,255,.18)"/><text x="192" y="536" fill="#f0b33f" font-size="15" font-weight="900" letter-spacing="4">VALIDATE</text><text x="192" y="580" fill="#fff" font-size="30" font-weight="850">Recompute score</text>
    <rect x="522" y="474" width="286" height="160" rx="30" fill="#111d32" stroke="rgba(255,255,255,.18)"/><text x="554" y="530" fill="#f0b33f" font-size="15" font-weight="900" letter-spacing="4">RANK</text><text x="554" y="574" fill="#fff" font-size="30" font-weight="850">ELO movement</text><text x="554" y="608" fill="#a8b4c7" font-size="20">only after validation</text>
    <rect x="870" y="472" width="250" height="160" rx="30" fill="#111d32" stroke="rgba(255,255,255,.18)"/><text x="902" y="528" fill="#f0b33f" font-size="15" font-weight="900" letter-spacing="4">RETURN</text><text x="902" y="572" fill="#fff" font-size="30" font-weight="850">Progress loop</text>
  </g>
  <g stroke="url(#hot)" stroke-width="5" stroke-linecap="round" opacity=".82"><path d="M330 186H468"/><path d="M738 176H850"/><path d="M984 250C944 354 654 392 446 520"/><path d="M446 558H522"/><path d="M808 554H870"/></g>
  <circle cx="600" cy="360" r="76" fill="url(#hot)"/><text x="600" y="352" text-anchor="middle" fill="#111827" font-family="Inter, Arial" font-size="24" font-weight="950">game loop</text><text x="600" y="382" text-anchor="middle" fill="#111827" font-family="Inter, Arial" font-size="24" font-weight="950">with guardrails</text>
</svg>
